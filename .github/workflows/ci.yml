name: CipherSync CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v4
      with:
        version: v1.56.2

    - name: Run All Unit Tests
      run: go test -v ./...

    - name: Generate Memory Profile (Team Alpha Pipeline)
      run: go test -v -memprofile=mem.out ./internal/engine

    - name: Enforce Memory Profiling Gate
      run: go run scripts/check_memory.go mem.out